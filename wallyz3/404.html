<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wallyz-grill-website/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallyz Grill</title>
    <script>
      // Handle GitHub Pages SPA redirect from 404.html
      (function() {
        var base = '/wallyz-grill-website';
        var path = window.location.pathname;
        var search = window.location.search;

        // Strip the base path to get the route portion
        var route = path.startsWith(base) ? path.slice(base.length) : path;

        // If there's a meaningful route (e.g. /admin, /restaurant), convert to hash route
        // and redirect to the index with a hash so HashRouter picks it up
        if (route && route !== '/' && route !== '') {
          var hashUrl = window.location.origin + base + '/#' + route + search;
          window.location.replace(hashUrl);
          return;
        }

        // Legacy: restore sessionStorage redirect
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
          return;
        }

        // Handle ?q= param from Clover redirect
        if (search) {
          var params = new URLSearchParams(search);
          var q = params.get('q');
          if (q) {
            var restored = q.replace(/~and~/g, '&');
            params.delete('p');
            params.delete('q');
            var restoredParams = new URLSearchParams(restored);
            restoredParams.forEach(function(v, k) { params.set(k, v); });
            params.delete('p');
            params.delete('q');
            history.replaceState(null, null, window.location.pathname + '?' + params.toString());
          }
        }
      })();
    </script>
