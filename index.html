<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wallyz-grill-website/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallyz Grill</title>
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var search = window.location.search;
        if (search) {
          var params = new URLSearchParams(search);
          var q = params.get('q');
          if (q) {
            var restored = q.replace(/~and~/g, '&');
            params.delete('p');
            params.delete('q');
            var restoredParams = new URLSearchParams(restored);
            restoredParams.forEach(function(v, k) { params.set(k, v); });
            params.delete('p');
            params.delete('q');
            history.replaceState(null, null, window.location.pathname + '?' + params.toString());
          }
        }
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Wallyz Grill">
    <meta name="theme-color" content="#f97316">
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
